<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
  
  <!-- QR code pattern -->
  <g fill="#007bff">
    <!-- Top-left finder pattern -->
    <rect x="20" y="20" width="40" height="40" fill="none" stroke="#007bff" stroke-width="3"/>
    <rect x="28" y="28" width="24" height="24" fill="#007bff"/>
    <rect x="34" y="34" width="12" height="12" fill="white"/>
    
    <!-- Top-right finder pattern -->
    <rect x="140" y="20" width="40" height="40" fill="none" stroke="#007bff" stroke-width="3"/>
    <rect x="148" y="28" width="24" height="24" fill="#007bff"/>
    <rect x="154" y="34" width="12" height="12" fill="white"/>
    
    <!-- Bottom-left finder pattern -->
    <rect x="20" y="140" width="40" height="40" fill="none" stroke="#007bff" stroke-width="3"/>
    <rect x="28" y="148" width="24" height="24" fill="#007bff"/>
    <rect x="34" y="154" width="12" height="12" fill="white"/>
    
    <!-- Data modules -->
    <rect x="75" y="75" width="8" height="8" fill="#007bff"/>
    <rect x="95" y="85" width="6" height="6" fill="#007bff"/>
    <rect x="110" y="95" width="7" height="7" fill="#007bff"/>
    <rect x="85" y="105" width="8" height="8" fill="#007bff"/>
    <rect x="100" y="110" width="6" height="6" fill="#007bff"/>
    <rect x="120" y="100" width="5" height="5" fill="#007bff"/>
  </g>
  
  <!-- Center badge with refresh icon -->
  <circle cx="100" cy="100" r="35" fill="#007bff" opacity="0.1" stroke="#007bff" stroke-width="1"/>
  <text x="100" y="110" font-size="50" font-weight="bold" fill="#007bff" text-anchor="middle" font-family="Arial, sans-serif">⟳</text>
</svg>
